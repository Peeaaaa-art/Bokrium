name: Upload Vite assets to Cloudflare R2

on:
  push:
    branches: [main]
    paths:
      - "app/frontend/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "config/vite.json"
      - "tsconfig.json"
      - "types/**"

# Set minimal permissions for the entire workflow
permissions:
  contents: read

jobs:
  upload-vite-assets:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 22
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Upload to Cloudflare R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            -e RCLONE_CONFIG_R2_TYPE \
            -e RCLONE_CONFIG_R2_PROVIDER \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID \
            -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_ENDPOINT \
            rclone/rclone:1.70.3 \
            sync /workspace/public/vite "r2:${{ secrets.R2_BUCKET }}/vite" \
            --s3-acl public-read \
            --header-upload "Cache-Control: public, max-age=31536000, immutable"
